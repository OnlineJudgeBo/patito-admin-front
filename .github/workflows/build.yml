name: Patito Admin - UI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (informational until existing lint debt is fixed)
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build

  docker-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --rm \
            -t ghcr.io/onlinejudgebo/juezvirtualbo-admin-front:juezvirtual \
            -t ghcr.io/onlinejudgebo/juezvirtualbo-admin-front:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/onlinejudgebo/juezvirtualbo-admin-front:juezvirtual
          docker push ghcr.io/onlinejudgebo/juezvirtualbo-admin-front:${{ github.sha }}
